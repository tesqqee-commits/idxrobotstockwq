name: IDX Telegram Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

concurrency:
  group: idx-telegram-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  send-idx-disclosures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run IDX bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IDX_LOOKBACK_HOURS: "2"
          MAX_IDX_SEND_PER_RUN: "5"
        run: node idx-local-bot.js

      - name: Save sent state
        run: |
          if [ -n "$(git status --porcelain idx-sent.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add idx-sent.json
            git commit -m "Update IDX sent state"
            git push
          else
            echo "No sent state changes"
          fi
